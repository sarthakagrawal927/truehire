name: Deploy to Cloudflare Workers
on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - '.github/workflows/deploy.yml'
      - 'apps/web/**'
      - 'packages/**'
  pull_request:
    branches: [main]
    paths:
      - '.github/workflows/deploy.yml'
      - 'apps/web/**'
      - 'packages/**'
  pull_request_target:
    types: [closed]

jobs:
  # Apply pending Drizzle migrations to prod BEFORE the worker deploys, so the
  # new code never serves traffic against a schema missing its tables. CI never
  # ran migrations before, which let prod drift behind the committed schema.
  # Soft-skips when the DB secrets are not configured, so it can't block deploys.
  migrate-production:
    if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v6
      - uses: actions/setup-node@v6
        with: { node-version: '20', cache: pnpm }
      # NOT --ignore-scripts: the libsql native client (allow-listed in
      # pnpm-workspace.yaml) must build for the migrator to connect.
      - run: pnpm install --frozen-lockfile
      - name: Apply pending DB migrations (skips if secrets unset)
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          DATABASE_AUTH_TOKEN: ${{ secrets.DATABASE_AUTH_TOKEN }}
        run: |
          if [ -z "$DATABASE_URL" ] || [ -z "$DATABASE_AUTH_TOKEN" ]; then
            echo "::warning::DATABASE_URL/DATABASE_AUTH_TOKEN secrets not set — skipping auto-migration. Add them in repo Settings → Secrets and variables → Actions to keep the prod schema in sync."
            exit 0
          fi
          pnpm db:migrate

  deploy-production:
    if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
    needs: migrate-production
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v6
      - uses: actions/setup-node@v6
        with: { node-version: '20', cache: pnpm }
      - run: pnpm install --frozen-lockfile --ignore-scripts
      - name: Validate GitHub deploy secrets
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
        run: |
          test -n "$CLOUDFLARE_API_TOKEN" || { echo "::error::Missing GitHub secret: CLOUDFLARE_API_TOKEN"; exit 1; }
      - run: pnpm --filter web cf:build
      - name: Deploy production worker
        uses: cloudflare/wrangler-action@v4
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          workingDirectory: apps/web
          wranglerVersion: "4.85.0"
          command: deploy
      - name: Smoke production
        run: curl --fail --silent --show-error --location --output /dev/null --retry 3 --retry-delay 5 https://truehire.sarthakagrawal927.workers.dev

  deploy-preview:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v6
      - uses: actions/setup-node@v6
        with: { node-version: '20', cache: pnpm }
      - run: pnpm install --frozen-lockfile --ignore-scripts
      - name: Validate GitHub deploy secrets
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
        run: |
          test -n "$CLOUDFLARE_API_TOKEN" || { echo "::error::Missing GitHub secret: CLOUDFLARE_API_TOKEN"; exit 1; }
      - run: pnpm --filter web cf:build
      - name: Deploy preview worker
        uses: cloudflare/wrangler-action@v4
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          workingDirectory: apps/web
          wranglerVersion: "4.85.0"
          command: deploy --name truehire-pr-${{ github.event.number }}
      - name: Comment preview URL on PR
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: `🚀 **Preview worker deployed:** \`truehire-pr-${{ github.event.number }}\``
            })

  cleanup-preview:
    # Tear down the per-PR preview worker on ANY close (merged or not) so none orphan.
    if: github.event_name == 'pull_request_target'
    runs-on: ubuntu-latest
    steps:
      - uses: cloudflare/wrangler-action@v4
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          workingDirectory: apps/web
          wranglerVersion: "4.85.0"
          command: delete --name truehire-pr-${{ github.event.number }} --force
