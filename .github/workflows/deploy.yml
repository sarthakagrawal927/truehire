name: Deploy to Cloudflare Workers
on:
  push:
    branches: [main]
    paths:
      - '.github/workflows/deploy.yml'
      - 'apps/web/**'
      - 'packages/**'
  pull_request:
    branches: [main]
    paths:
      - '.github/workflows/deploy.yml'
      - 'apps/web/**'
      - 'packages/**'
  pull_request_target:
    types: [closed]

jobs:
  deploy-production:
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with: { node-version: '20', cache: pnpm }
      - run: pnpm install --frozen-lockfile --ignore-scripts
      - run: pnpm --filter web cf:build
      - name: Deploy production worker
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CF_API_TOKEN }}
          workingDirectory: apps/web
          command: deploy
      - name: Smoke production
        run: curl --fail --silent --show-error --location --output /dev/null --retry 3 --retry-delay 5 https://truehire.sarthakagrawal927.workers.dev

  deploy-preview:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with: { node-version: '20', cache: pnpm }
      - run: pnpm install --frozen-lockfile --ignore-scripts
      - run: pnpm --filter web cf:build
      - name: Deploy preview worker
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CF_API_TOKEN }}
          workingDirectory: apps/web
          command: deploy --name truehire-pr-${{ github.event.number }}
      - name: Comment preview URL on PR
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: `🚀 **Preview worker deployed:** \`truehire-pr-${{ github.event.number }}\``
            })

  cleanup-preview:
    if: github.event_name == 'pull_request_target' && github.event.pull_request.merged == true
    runs-on: ubuntu-latest
    steps:
      - uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CF_API_TOKEN }}
          workingDirectory: apps/web
          command: delete --name truehire-pr-${{ github.event.number }} --force
