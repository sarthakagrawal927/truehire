packages:
  - "apps/*"
  - "apps/web/landing-astro"
  - "packages/*"

# Pin packages that were published in the last 24h so the org
# supply-chain policy on `pnpm install --frozen-lockfile` doesn't
# reject the lockfile. Bump these as they age past the cutoff.
overrides:
  rollup: 4.60.2
  wrangler: 4.85.0

# Native deps whose install scripts are allowed to run (pnpm 10 blocks by
# default). better-sqlite3 powers the Cursor adapter in packages/cli.
onlyBuiltDependencies:
  - better-sqlite3
